<svg viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg" width="900" height="120">
  <defs>
    <style>
      .bg { fill: #000; }
      .card { rx: 0; fill: #030a03; stroke-width: 1; }
      .label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
      .icon { font-size: 26px; }
      .bar-bg { fill: #0a1a0a; }
      .bar-fill { animation: barGrow 1.5s ease-out forwards; }
      @keyframes barGrow { from { width: 0; } }

      .c1 { fill: #00ff41; stroke: rgba(0,255,65,0.3); }
      .c2 { fill: #00ffff; stroke: rgba(0,255,255,0.3); }
      .c3 { fill: #ff00ff; stroke: rgba(255,0,255,0.3); }
      .c4 { fill: #ffe600; stroke: rgba(255,230,0,0.3); }
      .c5 { fill: #ff8800; stroke: rgba(255,136,0,0.3); }
      .c6 { fill: #ff003c; stroke: rgba(255,0,60,0.3); }

      .f1 { animation: cardPop 0.4s 0.2s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }
      .f2 { animation: cardPop 0.4s 0.4s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }
      .f3 { animation: cardPop 0.4s 0.6s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }
      .f4 { animation: cardPop 0.4s 0.8s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }
      .f5 { animation: cardPop 0.4s 1.0s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }
      .f6 { animation: cardPop 0.4s 1.2s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(20px); }

      @keyframes cardPop {
        from { opacity: 0; transform: translateY(16px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0)   scale(1); }
      }
    </style>
  </defs>
  <rect width="900" height="120" class="bg"/>

  <!-- Card 1: Voice Input -->
  <g class="f1">
    <rect x="8"  y="8" width="138" height="104" class="card c1"/>
    <text x="77" y="42" text-anchor="middle" class="icon">🎤</text>
    <text x="77" y="62" text-anchor="middle" class="label c1">Voice Input</text>
    <rect x="18" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="18" y="74" width="104" height="4" fill="#00ff41" class="bar-fill" style="animation-delay:0.3s"/>
    <text x="77" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">SpeechRecognition</text>
  </g>

  <!-- Card 2: Voice Output -->
  <g class="f2">
    <rect x="154" y="8" width="138" height="104" class="card c2"/>
    <text x="223" y="42" text-anchor="middle" class="icon">🔊</text>
    <text x="223" y="62" text-anchor="middle" class="label c2">Voice Output</text>
    <rect x="164" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="164" y="74" width="88" height="4" fill="#00ffff" class="bar-fill" style="animation-delay:0.5s"/>
    <text x="223" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">pyttsx3 · Offline</text>
  </g>

  <!-- Card 3: Web Agent -->
  <g class="f3">
    <rect x="300" y="8" width="138" height="104" class="card c3"/>
    <text x="369" y="42" text-anchor="middle" class="icon">🌐</text>
    <text x="369" y="62" text-anchor="middle" class="label c3">Web Agent</text>
    <rect x="310" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="310" y="74" width="100" height="4" fill="#ff00ff" class="bar-fill" style="animation-delay:0.7s"/>
    <text x="369" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">DuckDuckGo DDGS</text>
  </g>

  <!-- Card 4: Personas -->
  <g class="f4">
    <rect x="446" y="8" width="138" height="104" class="card c4"/>
    <text x="515" y="42" text-anchor="middle" class="icon">🎭</text>
    <text x="515" y="62" text-anchor="middle" class="label c4">6 Personas</text>
    <rect x="456" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="456" y="74" width="118" height="4" fill="#ffe600" class="bar-fill" style="animation-delay:0.9s"/>
    <text x="515" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">Gemini System Prompts</text>
  </g>

  <!-- Card 5: Memory -->
  <g class="f5">
    <rect x="592" y="8" width="138" height="104" class="card c5"/>
    <text x="661" y="42" text-anchor="middle" class="icon">💾</text>
    <text x="661" y="62" text-anchor="middle" class="label c5">Memory</text>
    <rect x="602" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="602" y="74" width="94" height="4" fill="#ff8800" class="bar-fill" style="animation-delay:1.1s"/>
    <text x="661" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">JSON Sessions</text>
  </g>

  <!-- Card 6: Multimodal -->
  <g class="f6">
    <rect x="754" y="8" width="138" height="104" class="card c6"/>
    <text x="823" y="42" text-anchor="middle" class="icon">📎</text>
    <text x="823" y="62" text-anchor="middle" class="label c6">Multimodal</text>
    <rect x="764" y="74" width="118" height="4" class="bar-bg"/>
    <rect x="764" y="74" width="110" height="4" fill="#ff003c" class="bar-fill" style="animation-delay:1.3s"/>
    <text x="823" y="100" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="9" fill="#2a5a2a">PIL · Gemini Vision</text>
  </g>
</svg>
